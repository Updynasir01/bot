version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: botxafiis-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: botxafiis
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: botxafiis_secure_pass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: botxafiis-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://postgres:botxafiis_secure_pass@postgres:5432/botxafiis
      JWT_SECRET: change_this_to_a_long_random_string_in_production
      NODE_ENV: production
      PORT: 5000
      FRONTEND_URL: http://localhost:3000
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      TWILIO_WHATSAPP_FROM: ${TWILIO_WHATSAPP_FROM}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-http://localhost:5000}
    ports:
      - "5000:5000"
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build: ./frontend
    container_name: botxafiis-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"

volumes:
  postgres_data:
  uploads_data:
